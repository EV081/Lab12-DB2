services:
  pg_master:
    image: postgres:16
    container_name: pg_master
    environment:
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    networks:
      - pg_net

  pg_worker1:
    image: postgres:16
    container_name: pg_worker1
    environment:
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"
    networks:
      - pg_net

  pg_worker2:
    image: postgres:16
    container_name: pg_worker2
    environment:
      POSTGRES_PASSWORD: pass
    ports:
      - "5434:5432"
    networks:
      - pg_net

networks:
  pg_net:
    driver: bridge